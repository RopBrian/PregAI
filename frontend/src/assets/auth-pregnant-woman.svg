<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a4a42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2f28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dressGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="500" fill="#fdf9f3"/>
  
  <!-- Hair -->
  <path d="M 80 60 Q 60 20 150 10 Q 240 20 220 60 Q 215 85 200 95 L 100 95 Q 85 85 80 60" fill="#1a1410"/>
  
  <!-- Head -->
  <circle cx="150" cy="100" r="55" fill="url(#skinTone)"/>
  
  <!-- Neck -->
  <rect x="130" y="150" width="40" height="25" fill="url(#skinTone)"/>
  
  <!-- Shoulders -->
  <ellipse cx="95" cy="180" rx="35" ry="25" fill="url(#dressGradient)"/>
  <ellipse cx="205" cy="180" rx="35" ry="25" fill="url(#dressGradient)"/>
  
  <!-- Body with pregnancy bump -->
  <path d="M 100 180 Q 80 220 85 310 Q 85 380 150 400 Q 215 380 215 310 Q 220 220 200 180" fill="url(#dressGradient)"/>
  
  <!-- Left arm -->
  <path d="M 100 185 Q 50 200 40 280" stroke="url(#skinTone)" stroke-width="22" fill="none" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <path d="M 200 185 Q 250 200 260 280" stroke="url(#skinTone)" stroke-width="22" fill="none" stroke-linecap="round"/>
  
  <!-- Left hand -->
  <circle cx="40" cy="280" r="14" fill="url(#skinTone)"/>
  
  <!-- Right hand holding ultrasound images -->
  <circle cx="260" cy="280" r="14" fill="url(#skinTone)"/>
  
  <!-- Ultrasound images in right hand -->
  <rect x="250" y="240" width="28" height="42" fill="#fafafa" stroke="#888" stroke-width="1" rx="2"/>
  <rect x="255" y="250" width="18" height="25" fill="#3a4a5a" opacity="0.5"/>
  
  <rect x="252" y="290" width="28" height="42" fill="#fafafa" stroke="#888" stroke-width="1" rx="2"/>
  <rect x="257" y="300" width="18" height="25" fill="#3a4a5a" opacity="0.5"/>
  
  <!-- Left leg -->
  <rect x="125" y="380" width="25" height="100" fill="url(#skinTone)" rx="12"/>
  
  <!-- Right leg -->
  <rect x="150" y="380" width="25" height="100" fill="url(#skinTone)" rx="12"/>
  
  <!-- Left foot -->
  <ellipse cx="137.5" cy="485" rx="18" ry="13" fill="url(#skinTone)"/>
  
  <!-- Right foot -->
  <ellipse cx="162.5" cy="485" rx="18" ry="13" fill="url(#skinTone)"/>
  
  <!-- Eyes -->
  <circle cx="130" cy="90" r="5" fill="#1a1410"/>
  <circle cx="170" cy="90" r="5" fill="#1a1410"/>
  <circle cx="131" cy="88" r="1.5" fill="#ffffff"/>
  <circle cx="171" cy="88" r="1.5" fill="#ffffff"/>
  
  <!-- Warm smile -->
  <path d="M 138 115 Q 150 125 162 115" stroke="#1a1410" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Glow/warmth around the figure -->
  <circle cx="150" cy="250" r="140" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.2"/>
</svg>
